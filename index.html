<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta property="og:url" content="https://commandcenterdev.netlify.app">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Command Center | Your Workflow Accelerator</title>
    <meta name="description" content="Generate branch names and git commands instantly from your task titles." />
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/src/style.css">
  </head>
  <body>
    <div id="toast-container"></div>
    <div class="container">
      <header>
        <div class="lang-switcher">
          <button id="lang-btn">ES</button>
        </div>
        <h1 id="txt-title">Command Center</h1>
        <p id="txt-subtitle">Transform tasks into git workflows instantly</p>
        <div id="task-history" class="task-history">
          <!-- History items injected here -->
        </div>
      </header>

      <nav class="top-nav">
        <button class="nav-item active" data-module="git">
          <i data-lucide="git-branch"></i>
          <span>Git</span>
        </button>
        <button class="nav-item" data-module="node">
          <i data-lucide="package"></i>
          <span>Node</span>
        </button>
        <button class="nav-item" data-module="docker">
          <i data-lucide="container"></i>
          <span>Docker</span>
        </button>
      </nav>

      <main class="task-deck">
        <div id="module-git" class="module-content active">
        <div class="workflow-selector">
          <button class="wf-btn active" data-wf="new" id="btn-wf-new"><span>New Branch</span></button>
          <button class="wf-btn" data-wf="recreate" id="btn-wf-recreate"><span>Recreate Branch</span></button>
        </div>

        <div class="input-row">
          <div class="input-group" style="flex: 2; position: relative;">
            <label class="input-label" for="task-title">Task Title / Branch</label>
            <div style="position: relative;">
              <input type="text" id="task-title" placeholder="e.g. Add user authentication flow" autocomplete="off" style="padding-right: 50px;">
              <button id="translate-btn" class="translate-trigger" title="Translate Title">
                <i data-lucide="languages"></i>
              </button>
            </div>
          </div>
          <div class="input-group" id="base-branch-group" style="flex: 1; display: none;">
            <label class="input-label" for="base-branch">Base Branch</label>
            <input type="text" id="base-branch" value="dev" autocomplete="off">
          </div>
        </div>

        <label class="input-label" id="lbl-task-type">Task Type</label>
        <div class="task-types" id="task-types">
          <button class="type-btn active" data-type="feature">Feature</button>
          <button class="type-btn" data-type="fix">Fix</button>
          <button class="type-btn" data-type="hotfix">Hotfix</button>
          <button class="type-btn" data-type="chore">Chore</button>
          <button class="type-btn" data-type="docs">Docs</button>
          <button class="type-btn" data-type="refactor">Refactor</button>
        </div>

        <div id="output-section" class="output-section">
          <label class="input-label" id="lbl-target-branch">Target Branch</label>
          <div class="branch-preview">
            <input type="text" class="branch-input" id="branch-name-input" autocomplete="off" spellcheck="false">
            <button class="copy-btn icon-only" id="copy-branch" title="Copy Branch Name">
              <i data-lucide="copy" style="width: 16px; height: 16px;"></i>
            </button>
          </div>
          <div id="branch-warning" class="input-warning" style="display: none;"></div>
          <div id="manual-notice" class="manual-notice" style="display: none;"></div>
          <button id="reset-branch" class="secondary-btn" style="display: none; margin-top: 8px; font-size: 0.8rem; height: 32px;">Reset to auto</button>

          <label class="input-label" id="lbl-commit-msg">Commit Message</label>
          <div class="branch-preview">
            <textarea class="branch-input" id="commit-msg-input" spellcheck="false" autocomplete="off" rows="1"></textarea>
          </div>

          <div class="header-with-action">
            <label class="input-label" id="lbl-workflow-cmds">Workflow Commands</label>
            <div style="display: flex; gap: 8px;">
              <button id="toggle-terminal-mode" class="terminal-toggle" title="Terminal View">
                <i data-lucide="terminal"></i>
                <span>Terminal View</span>
              </button>
              <button class="copy-btn icon-only" id="copy-all" style="background: rgba(255, 255, 255, 0.05); height: 34px; width: 34px;" title="Copy Sequence">
                <i data-lucide="copy" style="width: 16px; height: 16px;"></i>
              </button>
            </div>
          </div>
          <div class="command-list" id="command-list">
            <!-- Commands will be injected here -->
          </div>

          <label class="input-label" style="margin-top: 30px;" id="lbl-full-preview">Full Workflow Preview</label>
          <div class="terminal-preview" id="terminal-preview">
            <div class="terminal-header">
              <div class="dots"><span></span><span></span><span></span></div>
              <div class="terminal-title">bash — workflow.sh</div>
            </div>
            <div class="terminal-body">
              <span class="prompt">$</span>
              <code id="full-command-text"></code>
            </div>
            <button class="copy-btn icon-only" id="copy-terminal" title="Copy Full Sequence">
              <i data-lucide="copy" style="width: 16px; height: 16px;"></i>
            </button>
          </div>

          <div class="docker-library" style="margin-top: 40px;">
            <div class="library-header">
              <label class="input-label" id="lbl-git-vault">Git Vault (Quick Actions)</label>
              <div class="search-box">
                <i data-lucide="search"></i>
                <input type="text" id="git-search" placeholder="Search git commands..." autocomplete="off">
              </div>
            </div>
            <div id="git-library-grid" class="library-grid">
              <!-- Git library injected here -->
            </div>
          </div>
        </div>
        </div><!-- End module-git -->

        <div id="module-node" class="module-content">
          <label class="input-label" id="lbl-node-manager">Package Manager</label>
          <div class="workflow-selector" style="margin-bottom: 24px;">
            <button class="node-mgr-btn active" data-mgr="npm">NPM</button>
            <button class="node-mgr-btn" data-mgr="yarn">Yarn</button>
            <button class="node-mgr-btn" data-mgr="pnpm">PNPM</button>
          </div>

          <div class="input-row">
            <div class="input-group" style="flex: 2;">
              <label class="input-label" id="lbl-node-install">Install Packages</label>
              <input type="text" id="node-pkg-input" placeholder="e.g. lodash axios express" autocomplete="off">
            </div>
            <div class="input-group" style="flex: 1;">
              <label class="input-label" id="lbl-node-type">Type</label>
              <div class="workflow-selector" style="margin-bottom: 0;">
                <button class="node-type-btn active" data-type="std">Prod</button>
                <button class="node-type-btn" data-type="dev">Dev</button>
                <button class="node-type-btn" data-type="glob">Global</button>
              </div>
            </div>
          </div>

          <label class="input-label" id="lbl-node-quick">Quick NPM Actions</label>
          <div class="task-types" style="margin-bottom: 30px;">
            <button class="node-action-btn" data-cmd="npm init -y">Init</button>
            <button class="node-action-btn" data-cmd="npm install">Install All</button>
            <button class="node-action-btn" data-cmd="npm audit fix">Audit Fix</button>
            <button class="node-action-btn" data-cmd="npm version patch">Patch</button>
            <button class="node-action-btn" data-cmd="npm run dev">Run Dev</button>
          </div>

          <div id="node-output" class="output-section">
            <label class="input-label" id="lbl-node-output">Generated Commands</label>
            <div class="command-list" id="node-command-list">
              <!-- Node commands injected here -->
            </div>
          </div>

          <div class="docker-library" style="margin-top: 40px;">
            <div class="library-header">
              <label class="input-label" id="lbl-node-vault">Node Vault (Tools)</label>
              <div class="search-box">
                <i data-lucide="search"></i>
                <input type="text" id="node-search" placeholder="Search node commands..." autocomplete="off">
              </div>
            </div>
            <div id="node-library-grid" class="library-grid">
              <!-- Node library injected here -->
            </div>
          </div>
        </div><!-- End module-node -->

        <div id="module-docker" class="module-content">
          <div class="input-row">
            <div class="input-group" style="flex: 1.5;">
              <label class="input-label" id="lbl-docker-img">Image Name</label>
              <input type="text" id="docker-img-input" placeholder="e.g. my-app:latest" autocomplete="off">
            </div>
            <div class="input-group" style="flex: 1;">
              <label class="input-label" id="lbl-docker-port">Ports</label>
              <input type="text" id="docker-port-input" placeholder="e.g. 8080:80" autocomplete="off">
            </div>
          </div>

          <div class="input-row">
            <div class="input-group" style="flex: 1;">
              <label class="input-label" id="lbl-docker-service">Service Name</label>
              <input type="text" id="docker-service-input" value="api" placeholder="e.g. api, app, web" autocomplete="off">
            </div>
            <div class="input-group" style="flex: 1.5;">
              <label class="input-label" id="lbl-docker-file">Compose File</label>
              <input type="text" id="docker-file-input" value="docker-compose.dev.yml" placeholder="e.g. docker-compose.yml" autocomplete="off">
            </div>
          </div>

          <label class="input-label" id="lbl-docker-compose">Docker Compose</label>
          <div class="task-types" style="margin-bottom: 24px;">
            <button class="docker-action-btn" data-cmd="docker-compose up -d">Compose Up</button>
            <button class="docker-action-btn" data-cmd="docker-compose down">Compose Down</button>
            <button class="docker-action-btn" data-cmd="docker-compose restart">Restart</button>
          </div>

          <label class="input-label" id="lbl-docker-quick">Quick Management</label>
          <div class="task-types" style="margin-bottom: 30px;">
            <button class="docker-action-btn" data-cmd="docker ps">List Running</button>
            <button class="docker-action-btn" data-cmd="docker images">List Images</button>
            <button class="docker-action-btn" data-cmd="docker system prune -a --volumes">Deep Clean</button>
          </div>

          <div id="docker-output" class="output-section">
            <label class="input-label" id="lbl-docker-output">Generated Commands</label>
            <div class="command-list" id="docker-command-list">
              <!-- Docker commands injected here -->
            </div>
          </div>

          <div class="docker-library">
            <div class="library-header">
              <label class="input-label" id="lbl-docker-vault">Docker Vault (Cheat Sheet)</label>
              <div class="search-box">
                <i data-lucide="search" style="width: 14px; height: 14px;"></i>
                <input type="text" id="docker-search" placeholder="Search command (e.g. logs, prune, network)..." autocomplete="off">
              </div>
            </div>
            <div id="docker-library-grid" class="library-grid">
              <!-- Library items will be injected here -->
            </div>
          </div>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
