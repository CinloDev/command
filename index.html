<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta property="og:url" content="https://commandcenterdev.netlify.app">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Command Center | Your Workflow Accelerator</title>
    <meta name="description" content="Generate branch names and git commands instantly from your task titles." />
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="/src/style.css">
  </head>
  <body class="theme-git">
    <div id="toast-container"></div>
    
    <!-- Custom Confirmation Modal -->
    <div id="custom-modal-overlay" class="modal-overlay">
      <div class="modal-content">
        <div class="modal-header">
          <i id="modal-icon" data-lucide="alert-circle" style="width: 32px; height: 32px;"></i>
          <h3 id="txt-modal-title">Are you sure?</h3>
        </div>
        <p id="txt-modal-message">This action cannot be undone.</p>
        <div class="modal-actions">
          <button id="modal-cancel-btn" class="secondary-btn">Cancel</button>
          <button id="modal-confirm-btn" class="secondary-btn confirm-btn">Confirm</button>
        </div>
      </div>
    </div>

    <div class="container">
      <header>
        <div class="lang-switcher">
          <button id="lang-btn">ES</button>
        </div>
        <h1 id="txt-title">Command Center</h1>
        <p id="txt-subtitle">Transform tasks into git workflows instantly</p>
        <div id="task-history" class="task-history">
          <!-- History items injected here -->
        </div>
      </header>

      <nav class="top-nav">
        <button class="nav-item active" data-module="git">
          <img src="https://cdn.simpleicons.org/git/white" alt="Git">
          <span>Git</span>
        </button>
        <button class="nav-item" data-module="node">
          <img src="https://cdn.simpleicons.org/nodedotjs/white" alt="Node.js">
          <span>Node</span>
        </button>
        <button class="nav-item" data-module="docker">
          <img src="https://cdn.simpleicons.org/docker/white" alt="Docker">
          <span>Docker</span>
        </button>
        <button class="nav-item" data-module="favs">
          <i data-lucide="star" style="width: 20px; height: 20px;"></i>
          <span>Favs</span>
        </button>
        <button class="nav-item" data-module="personal">
          <i data-lucide="lock" style="width: 20px; height: 20px;"></i>
          <span id="txt-nav-personal">Personal</span>
        </button>
      </nav>

      <main class="task-deck">
        <!-- Module Favs (Hidden by default) -->
        <div id="module-favs" class="module-content">
          <div class="library-header" style="flex-direction: column; align-items: start; gap: 12px;">
            <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
              <h2 id="lbl-favs-vault" class="input-label" style="margin: 0;">My Favorites</h2>
              <div id="fav-order-controls" style="display: flex; gap: 8px;">
                <!-- Order buttons will be injected here -->
              </div>
            </div>
            <p id="txt-favs-subtitle" style="font-size: 0.8rem; color: var(--text-secondary);">Your most used commands organized by stack</p>
          </div>
          <div id="favs-library-grid" class="library-grid">
            <!-- Favs injected here -->
          </div>
        </div>

        <!-- Module Personal (Private Vault) -->
        <div id="module-personal" class="module-content">
          <div class="library-header personal-header" style="margin-bottom: 30px;">
            <div style="display: flex; flex-direction: column; gap: 4px; text-align: left;">
              <h2 id="lbl-personal-vault" class="input-label" style="margin: 0;">Private Vault</h2>
              <p id="txt-personal-subtitle" style="font-size: 0.8rem; color: var(--text-secondary); margin: 0;">Your personal commands saved locally in this browser.</p>
            </div>
            <div class="theme-picker-container" style="display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 12px; border: 1px solid var(--card-border); align-self: flex-start;">
              <label for="personal-theme-color" style="font-size: 0.7rem; color: var(--text-secondary); cursor: pointer; margin: 0;">Theme</label>
              <input type="color" id="personal-theme-color" value="#a855f7" style="width: 24px; height: 24px; border: none; background: none; cursor: pointer; padding: 0; border-radius: 4px; overflow: hidden; display: block;">
            </div>
          </div>
          
          <div class="custom-command-form" style="background: rgba(255, 255, 255, 0.03); border: 1px solid var(--card-border); padding: 24px; border-radius: 16px; margin-bottom: 40px;">
            <div class="input-row" style="margin-bottom: 20px;">
              <div class="input-group">
                <label class="input-label" id="lbl-custom-desc">Description</label>
                <input type="text" id="custom-cmd-desc" placeholder="e.g. My private deploy script" autocomplete="off">
              </div>
              <div class="input-group">
                <label class="input-label" id="lbl-custom-val">Command</label>
                <textarea id="custom-cmd-val" placeholder="e.g. git add .&#10;git commit -m 'sync'&#10;git push" autocomplete="off" rows="3" style="min-height: 100px; resize: vertical;"></textarea>
              </div>
            </div>
            
            <div style="margin-bottom: 24px;">
              <label class="input-label" id="lbl-custom-icon">Select Icon</label>
              <div id="icon-picker" class="icon-picker">
                <button class="icon-opt active" data-icon="lock"><i data-lucide="lock"></i></button>
                <button class="icon-opt" data-icon="terminal"><i data-lucide="terminal"></i></button>
                <button class="icon-opt" data-icon="package"><i data-lucide="package"></i></button>
                <button class="icon-opt" data-icon="zap"><i data-lucide="zap"></i></button>
                <button class="icon-opt" data-icon="database"><i data-lucide="database"></i></button>
                <button class="icon-opt" data-icon="wrench"><i data-lucide="wrench"></i></button>
                <button class="icon-opt" data-icon="git-branch"><i data-lucide="git-branch"></i></button>
              </div>
            </div>

            <div style="display: flex; justify-content: flex-end; gap: 10px;">
              <button id="cancel-custom-cmd-btn" class="secondary-btn" style="display: none;">
                <span id="txt-cancel-edit">Cancel</span>
              </button>
              <button id="add-custom-cmd-btn" class="secondary-btn" style="background: var(--accent-primary); color: #000; font-weight: 600; border: none;">
                <i data-lucide="plus"></i>
                <span id="txt-add-command">Add Command</span>
              </button>
            </div>
          </div>

          <div id="personal-library-grid" class="library-grid">
            <!-- Custom commands injected here -->
          </div>
        </div>
        <div id="module-git" class="module-content active">
            <div class="workflow-selector">
              <button class="wf-btn active" data-wf="new" id="btn-wf-new"><span>New Branch</span></button>
              <button class="wf-btn" data-wf="recreate" id="btn-wf-recreate"><span>Recreate Branch</span></button>
            </div>

            <div class="input-row">
              <div class="input-group">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                  <label class="input-label" id="lbl-task-title" for="task-title" style="margin-bottom: 0;">Task Title / Branch</label>
                  <label class="auto-translate-control">
                    <input type="checkbox" id="auto-translate-check">
                    <span id="txt-auto-translate">Auto-translate</span>
                  </label>
                </div>
                <div class="input-with-actions">
                  <input type="text" id="task-title" placeholder="e.g. Add user authentication flow" autocomplete="off">
                  <div class="input-actions-group">
                    <button id="clear-task-btn" class="input-action-btn" title="Clear Title">
                      <i data-lucide="x"></i>
                    </button>
                    <button id="translate-btn" class="input-action-btn" title="Translate Title">
                      <i data-lucide="languages"></i>
                    </button>
                  </div>
                </div>
              </div>
              <div class="input-group" id="base-branch-group">
                <label class="input-label" id="lbl-base-branch" for="base-branch">Base Branch</label>
                <input type="text" id="base-branch" value="dev" autocomplete="off">
              </div>
            </div>

            <label class="input-label" id="lbl-task-type">Task Type</label>
            <div class="task-types" id="task-types">
              <button class="type-btn active" data-type="feature">Feature</button>
              <button class="type-btn" data-type="fix">Fix</button>
              <button class="type-btn" data-type="hotfix">Hotfix</button>
              <button class="type-btn" data-type="chore">Chore</button>
              <button class="type-btn" data-type="docs">Docs</button>
              <button class="type-btn" data-type="refactor">Refactor</button>
            </div>

        <div id="output-section" class="output-section">
          <label class="input-label" id="lbl-target-branch">Target Branch</label>
          <div class="branch-preview">
            <input type="text" class="branch-input" id="branch-name-input" autocomplete="off" spellcheck="false">
            <button class="copy-btn icon-only" id="copy-branch" title="Copy Branch Name">
              <i data-lucide="copy" style="width: 16px; height: 16px;"></i>
            </button>
          </div>
          <div id="branch-warning" class="input-warning" style="display: none;"></div>
          <div id="manual-notice" class="manual-notice" style="display: none;"></div>
          <button id="reset-branch" class="secondary-btn" style="display: none; margin-top: 8px; font-size: 0.8rem; height: 32px;">Reset to auto</button>

          <div id="commit-group">
            <label class="input-label" id="lbl-commit-msg">Commit Message</label>
            <div class="branch-preview">
              <textarea class="branch-input" id="commit-msg-input" spellcheck="false" autocomplete="off" rows="1"></textarea>
            </div>
          </div>

          <div class="header-with-action">
            <label class="input-label" id="lbl-workflow-cmds">Workflow Commands</label>
            <div style="display: flex; gap: 8px;">
              <button id="toggle-terminal-mode" class="terminal-toggle" title="Terminal View">
                <i data-lucide="terminal"></i>
                <span>Terminal View</span>
              </button>
              <button class="copy-btn icon-only" id="copy-all" style="background: rgba(255, 255, 255, 0.05); height: 34px; width: 34px;" title="Copy Sequence">
                <i data-lucide="copy" style="width: 16px; height: 16px;"></i>
              </button>
            </div>
          </div>
          <div class="command-list" id="command-list">
            <!-- Commands will be injected here -->
          </div>

          <label class="input-label" style="margin-top: 30px;" id="lbl-full-preview">Full Workflow Preview</label>
          <div class="terminal-preview" id="terminal-preview">
            <div class="terminal-header">
              <div class="dots"><span></span><span></span><span></span></div>
              <div class="terminal-title">bash — workflow.sh</div>
            </div>
            <div class="terminal-body">
              <span class="prompt">$</span>
              <code id="full-command-text"></code>
            </div>
            <button class="copy-btn icon-only" id="copy-terminal" title="Copy Full Sequence">
              <i data-lucide="copy" style="width: 16px; height: 16px;"></i>
            </button>
          </div>

        </div><!-- End output-section -->

        <div class="docker-library" style="margin-top: 40px;">
          <div class="library-header">
            <label class="input-label" id="lbl-git-vault">Git Vault (Quick Actions)</label>
            <div style="display: flex; gap: 10px; flex: 1; max-width: 600px;">
              <div class="search-box" style="max-width: 250px;">
                <i data-lucide="search"></i>
                <input type="text" id="git-search" placeholder="Search git commands..." autocomplete="off">
              </div>
              <div class="search-box" style="max-width: 350px;">
                <i data-lucide="hash"></i>
                <input type="text" id="git-param" placeholder="External Branch / Hash / Value..." autocomplete="off" style="padding-left: 45px;">
              </div>
            </div>
          </div>
          <div id="git-library-grid" class="library-grid">
            <!-- Git library injected here -->
          </div>
        </div>

        </div><!-- End module-git -->

        <div id="module-node" class="module-content">
            <label class="input-label" id="lbl-node-manager">Package Manager</label>
            <div class="workflow-selector" style="margin-bottom: 24px;">
              <button class="node-mgr-btn active" data-mgr="npm">NPM</button>
              <button class="node-mgr-btn" data-mgr="yarn">Yarn</button>
              <button class="node-mgr-btn" data-mgr="pnpm">PNPM</button>
            </div>

            <div class="input-row">
              <div class="input-group">
                <label class="input-label" id="lbl-node-install">Install Packages</label>
                <input type="text" id="node-pkg-input" placeholder="e.g. lodash axios express" autocomplete="off">
              </div>
              <div class="input-group">
                <label class="input-label" id="lbl-node-type">Type</label>
                <div class="workflow-selector" style="margin-bottom: 0;">
                  <button class="node-type-btn active" data-type="std">Prod</button>
                  <button class="node-type-btn" data-type="dev">Dev</button>
                  <button class="node-type-btn" data-type="glob">Global</button>
                </div>
              </div>
            </div>

            <label class="input-label" id="lbl-node-quick">Quick NPM Actions</label>
            <div class="task-types" style="margin-bottom: 30px;">
              <button class="node-action-btn" data-cmd="npm init -y">Init</button>
              <button class="node-action-btn" data-cmd="npm install">Install All</button>
              <button class="node-action-btn" data-cmd="npm audit fix">Audit Fix</button>
              <button class="node-action-btn" data-cmd="npm version patch">Patch</button>
              <button class="node-action-btn" data-cmd="npm run dev">Run Dev</button>
            </div>

          <div id="node-output" class="output-section">
            <label class="input-label" id="lbl-node-output">Generated Commands</label>
            <div class="command-list" id="node-command-list">
              <!-- Node commands injected here -->
            </div>
          </div>

          <div class="docker-library" style="margin-top: 40px;">
            <div class="library-header">
              <label class="input-label" id="lbl-node-vault">Node Vault (Tools)</label>
              <div class="search-box">
                <i data-lucide="search"></i>
                <input type="text" id="node-search" placeholder="Search node commands..." autocomplete="off">
              </div>
            </div>
            <div id="node-library-grid" class="library-grid">
              <!-- Node library injected here -->
            </div>
          </div>
        </div><!-- End module-node -->

        <div id="module-docker" class="module-content">
            <div class="input-row">
              <div class="input-group">
                <label class="input-label" id="lbl-docker-img">Image Name</label>
                <input type="text" id="docker-img-input" placeholder="e.g. my-app:latest" autocomplete="off">
              </div>
              <div class="input-group">
                <label class="input-label" id="lbl-docker-port">Ports</label>
                <input type="text" id="docker-port-input" placeholder="e.g. 8080:80" autocomplete="off">
              </div>
            </div>

            <div class="input-row">
              <div class="input-group">
                <label class="input-label" id="lbl-docker-service">Service Name</label>
                <input type="text" id="docker-service-input" value="api" placeholder="e.g. api, app, web" autocomplete="off">
              </div>
              <div class="input-group">
                <label class="input-label" id="lbl-docker-file">Compose File</label>
                <input type="text" id="docker-file-input" value="docker-compose.dev.yml" placeholder="e.g. docker-compose.yml" autocomplete="off">
              </div>
            </div>

            <label class="input-label" id="lbl-docker-compose">Docker Compose</label>
            <div class="task-types" style="margin-bottom: 24px;">
              <button class="docker-action-btn" data-cmd="docker-compose up -d">Compose Up</button>
              <button class="docker-action-btn" data-cmd="docker-compose down">Compose Down</button>
              <button class="docker-action-btn" data-cmd="docker-compose restart">Restart</button>
            </div>

            <label class="input-label" id="lbl-docker-quick">Quick Management</label>
            <div class="task-types" style="margin-bottom: 30px;">
              <button class="docker-action-btn" data-cmd="docker ps">List Running</button>
              <button class="docker-action-btn" data-cmd="docker images">List Images</button>
              <button class="docker-action-btn" data-cmd="docker system prune -a --volumes">Deep Clean</button>
            </div>

          <div id="docker-output" class="output-section">
            <label class="input-label" id="lbl-docker-output">Generated Commands</label>
            <div class="command-list" id="docker-command-list">
              <!-- Docker commands injected here -->
            </div>
          </div>

          <div class="docker-library">
            <div class="library-header">
              <label class="input-label" id="lbl-docker-vault">Docker Vault (Cheat Sheet)</label>
              <div class="search-box">
                <i data-lucide="search" style="width: 14px; height: 14px;"></i>
                <input type="text" id="docker-search" placeholder="Search command (e.g. logs, prune, network)..." autocomplete="off">
              </div>
            </div>
            <div id="docker-library-grid" class="library-grid">
              <!-- Library items will be injected here -->
            </div>
          </div>
        </div>
      </main>

      <footer>
        <div class="footer-content">
          <div class="footer-left">
            <p>&copy; 2026 <span>CinloDev</span>. All rights reserved.</p>
          </div>
          <div class="footer-right">
            <a href="https://cinlodev.com" target="_blank" title="Portfolio" class="social-link">
              <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
            </a>
            <a href="https://github.com/cinlodev" target="_blank" title="GitHub" class="social-link">
              <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></svg>
            </a>
          </div>
        </div>
      </footer>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
